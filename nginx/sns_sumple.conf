# =============================================================
# SNS Sumple - nginx reverse proxy configuration
#
# Setup:
#   sudo cp nginx/sns_sumple.conf /etc/nginx/sites-available/sns_sumple
#   sudo ln -s /etc/nginx/sites-available/sns_sumple /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (after nginx reload):
#   sudo certbot --nginx -d your-domain.com
# =============================================================

# Rate limiting zone (login / API abuse 対策)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Upstream definitions
upstream nextjs_app {
    server 127.0.0.1:3847;
    keepalive 64;
}

upstream naf_server {
    server 127.0.0.1:8743;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Let's Encrypt challenge (certbot 用)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # -------------------------------------------------------
    # SSL Configuration (Let's Encrypt / certbot)
    # certbot が自動的に以下を設定します。
    # 初回は certbot --nginx -d your-domain.com を実行。
    # -------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # -------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # -------------------------------------------------------
    # General Settings
    # -------------------------------------------------------
    client_max_body_size 50M;  # アップロードファイルサイズ上限

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # -------------------------------------------------------
    # NAF WebSocket (Socket.IO signaling server)
    # クライアントは同一ドメインの /socket.io/ に接続
    # -------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://naf_server;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forwarding headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 長時間接続（24時間）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # バッファリング無効（リアルタイム通信）
        proxy_buffering off;
    }

    # NAF health check endpoint
    location = /health {
        proxy_pass http://naf_server;
        proxy_set_header Host $host;
        access_log off;
    }

    # -------------------------------------------------------
    # Next.js Static Assets (長期キャッシュ)
    # -------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Uploaded files (medium-term cache)
    location /uploads/ {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Environment thumbnails (long cache)
    location /environments/ {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------
    # API routes (rate limiting)
    # -------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # Next.js Application (catch-all)
    # -------------------------------------------------------
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR は本番では不要だが念のため)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forwarding headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
